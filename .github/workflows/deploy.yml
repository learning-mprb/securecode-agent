# ── CD — runs on every push to main ──────────────────────────────────────────
# Jobs:
#   1. build-push   — build multi-arch image, push to ghcr.io with sha + latest tags
#   2. deploy       — helm upgrade --install on your cluster
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
      - "requirements.txt"
      - "helm/**"
      - ".github/workflows/deploy.yml"

  # Allow manual re-runs from the Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel a running deploy

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/code-security-agent
  HELM_RELEASE: code-security-agent
  HELM_CHART: ./helm/code-security-agent
  HELM_NAMESPACE: agents       # ← change to your namespace

jobs:
  # ── 1. Build & push ─────────────────────────────────────────────────────────
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # needed to push to ghcr.io
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to ghcr.io using the built-in GITHUB_TOKEN
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate tags:
      #   ghcr.io/org/code-security-agent:sha-<short-sha>   ← stable, immutable
      #   ghcr.io/org/code-security-agent:latest             ← convenience pointer
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=code-security-agent
            org.opencontainers.image.description=Security scanner powered by Llama 4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed image
        run: |
          echo "Image: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  # ── 2. Helm deploy ──────────────────────────────────────────────────────────
  deploy:
    name: Helm deploy
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # KUBECONFIG is a base64-encoded kubeconfig stored as a GitHub secret.
      # Create it with: base64 -w0 ~/.kube/config | pbcopy  (then paste into the secret)
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      # Confirm we can reach the cluster before deploying
      - name: Verify cluster connection
        run: kubectl cluster-info

      # helm upgrade --install  →  creates the release if it doesn't exist yet
      # --atomic                →  rolls back automatically if deploy fails
      # --wait                  →  blocks until all pods are Ready
      # --set image.*           →  override with the exact sha tag built above
      - name: Helm upgrade / install
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            --atomic \
            --wait \
            --timeout 5m \
            --set image.repository="${{ env.IMAGE_NAME }}" \
            --set image.tag="sha-$(echo '${{ github.sha }}' | cut -c1-7)" \
            --set llm.baseUrl="${{ secrets.LLM_BASE_URL }}" \
            --set llm.model="${{ vars.LLM_MODEL }}" \
            --values helm/code-security-agent/values.yaml

      - name: Print rollout status
        if: always()
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }} \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --timeout=2m || true

      # Post a summary to the GitHub Actions run page
      - name: Summary
        if: success()
        run: |
          echo "## Deployment successful 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Release | \`${{ env.HELM_RELEASE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:sha-$(echo '${{ github.sha }}' | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ env.HELM_NAMESPACE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
