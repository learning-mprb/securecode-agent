apiVersion: v1
kind: Service
metadata:
  name: {{ include "code-security-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "code-security-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "code-security-agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
