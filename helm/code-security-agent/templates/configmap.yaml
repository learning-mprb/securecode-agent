apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "code-security-agent.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "code-security-agent.labels" . | nindent 4 }}
data:
  LLAMA_BASE_URL:       {{ .Values.llm.baseUrl | quote }}
  LLAMA_MODEL:          {{ .Values.llm.model | quote }}
  LLAMA_API_KEY:        {{ .Values.llm.apiKey | quote }}
  MAX_TOKENS:           {{ .Values.llm.maxTokens | quote }}
  TEMPERATURE:          {{ .Values.llm.temperature | quote }}
  MAX_FILE_SIZE_BYTES:  {{ .Values.agent.maxFileSizeBytes | quote }}
  MAX_FILES_PER_SCAN:   {{ .Values.agent.maxFilesPerScan | quote }}
  WORKERS:              {{ .Values.agent.workers | quote }}
  LOG_LEVEL:            {{ .Values.agent.logLevel | quote }}
